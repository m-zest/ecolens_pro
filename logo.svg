<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EcoLens logo">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="55%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- soft background disc -->
  <circle cx="110" cy="110" r="104" fill="url(#bgGrad)"/>

  <!-- outer lens ring -->
  <circle cx="110" cy="110" r="78" fill="none" stroke="url(#ringGrad)" stroke-width="10"/>

  <!-- lens handle -->
  <rect x="168" y="160" width="14" height="40" rx="7" transform="rotate(-45 175 180)" fill="url(#ringGrad)"/>

  <!-- inner glass highlight -->
  <circle cx="110" cy="110" r="68" fill="#FFFFFF" fill-opacity="0.35"/>

  <!-- leaf inside lens -->
  <g transform="translate(110 110)">
    <path d="M -34 28 C -34 -10, -6 -36, 34 -34 C 36 6, 10 34, -28 34 C -32 32, -34 30, -34 28 Z"
          fill="url(#leafGrad)"/>
    <!-- leaf vein -->
    <path d="M -28 28 C -8 10, 14 -10, 30 -30"
          stroke="#ECFDF5" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85"/>
    <!-- side veins -->
    <path d="M -14 18 L -2 8" stroke="#ECFDF5" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <path d="M 0 6 L 12 -6" stroke="#ECFDF5" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <path d="M 14 -6 L 24 -18" stroke="#ECFDF5" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- highlight sparkle -->
  <circle cx="78" cy="78" r="10" fill="#FFFFFF" fill-opacity="0.55" filter="url(#soft)"/>
</svg>
